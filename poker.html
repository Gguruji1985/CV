<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Chips</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --felt: #1a3a2a;
    --felt-light: #1f4a35;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --cream: #f5edd6;
    --red: #c0392b;
    --chip-white: #f0ece0;
    --chip-red: #d63031;
    --chip-blue: #2980b9;
    --chip-green: #27ae60;
    --chip-black: #2d3436;
    --chip-purple: #8e44ad;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--felt);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(255,255,255,0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(0,0,0,0.3) 0%, transparent 60%),
      repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(0,0,0,0.015) 4px, rgba(0,0,0,0.015) 8px);
  }

  header {
    text-align: center;
    padding: 32px 20px 16px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--gold);
    letter-spacing: 0.08em;
    text-shadow: 0 2px 20px rgba(201,168,76,0.3);
  }

  header p {
    color: rgba(245,237,214,0.5);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* SETUP SCREEN */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 32px;
  }

  .setup-box {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  .setup-box h2 {
    font-family: 'Playfair Display', serif;
    color: var(--cream);
    font-size: 1.4rem;
    margin-bottom: 28px;
  }

  .player-count-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .count-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(201,168,76,0.4);
    background: transparent;
    color: var(--cream);
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .count-btn:hover { border-color: var(--gold); color: var(--gold); }
  .count-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #1a1a1a;
    box-shadow: 0 0 20px rgba(201,168,76,0.4);
  }

  .chips-setup {
    margin-bottom: 24px;
  }

  .chips-setup label {
    display: block;
    color: rgba(245,237,214,0.6);
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .chips-setup input {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    font-size: 1.2rem;
    padding: 10px 16px;
    width: 140px;
    text-align: center;
    outline: none;
  }

  .chips-setup input:focus { border-color: var(--gold); }

  .start-btn {
    background: var(--gold);
    color: #1a1a1a;
    border: none;
    border-radius: 10px;
    padding: 14px 40px;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.25);
  }

  .start-btn:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(201,168,76,0.4);
  }

  /* GAME SCREEN */
  #game { display: none; padding: 24px 16px 40px; }

  .pot-bar {
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 14px;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 900px;
    margin: 0 auto 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .pot-label {
    color: rgba(245,237,214,0.5);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .pot-value {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 2rem;
    font-weight: 900;
  }

  .pot-value span { font-size: 1rem; opacity: 0.6; margin-right: 4px; }

  .pot-actions { display: flex; gap: 10px; align-items: center; }

  .pot-btn {
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .pot-btn:hover { background: rgba(201,168,76,0.22); }

  .pot-btn.danger {
    color: #e74c3c;
    border-color: rgba(231,76,60,0.3);
    background: rgba(231,76,60,0.08);
  }

  .pot-btn.danger:hover { background: rgba(231,76,60,0.18); }

  /* PLAYERS GRID */
  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    max-width: 900px;
    margin: 0 auto;
  }

  .player-card {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    transition: border-color 0.2s;
  }

  .player-card.active-turn {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px rgba(201,168,76,0.2), inset 0 0 30px rgba(201,168,76,0.04);
  }

  .player-card.eliminated {
    opacity: 0.4;
    filter: grayscale(0.7);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .chip-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 900;
    color: #fff;
    flex-shrink: 0;
    border: 3px solid rgba(255,255,255,0.2);
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }

  .chip-avatar::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-conic-gradient(rgba(255,255,255,0.1) 0deg 30deg, transparent 30deg 60deg);
    opacity: 0.4;
  }

  .player-name-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    outline: none;
    width: 100%;
    padding: 2px 0;
    transition: border-color 0.2s;
  }

  .player-name-input:focus { border-bottom-color: var(--gold); }

  .chip-count {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--cream);
    text-align: center;
    margin: 4px 0 16px;
    line-height: 1;
  }

  .chip-count small {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: rgba(245,237,214,0.4);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: block;
    font-weight: 400;
    margin-top: 2px;
  }

  .quick-btns {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }

  .qbtn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(245,237,214,0.7);
    border-radius: 7px;
    padding: 7px 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .qbtn:hover { background: rgba(255,255,255,0.12); color: var(--cream); }

  .qbtn.add { border-color: rgba(39,174,96,0.3); color: #6dd5a0; }
  .qbtn.add:hover { background: rgba(39,174,96,0.12); }
  .qbtn.sub { border-color: rgba(192,57,43,0.3); color: #e07065; }
  .qbtn.sub:hover { background: rgba(192,57,43,0.12); }

  .custom-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .custom-input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 7px;
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 7px 10px;
    outline: none;
    text-align: center;
    min-width: 0;
  }

  .custom-input:focus { border-color: var(--gold); }

  .cust-add, .cust-sub {
    width: 34px; height: 34px;
    border-radius: 7px;
    border: none;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }

  .cust-add { background: rgba(39,174,96,0.2); color: #6dd5a0; border: 1px solid rgba(39,174,96,0.3); }
  .cust-add:hover { background: rgba(39,174,96,0.35); }
  .cust-sub { background: rgba(192,57,43,0.2); color: #e07065; border: 1px solid rgba(192,57,43,0.3); }
  .cust-sub:hover { background: rgba(192,57,43,0.35); }

  .action-row {
    display: flex;
    gap: 6px;
    margin-top: 12px;
  }

  .bet-btn {
    flex: 1;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    border-radius: 8px;
    padding: 9px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
  }

  .bet-btn:hover { background: rgba(201,168,76,0.2); }

  .elim-btn {
    background: rgba(231,76,60,0.1);
    border: 1px solid rgba(231,76,60,0.25);
    color: #e07065;
    border-radius: 8px;
    padding: 9px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .elim-btn:hover { background: rgba(231,76,60,0.2); }

  .turn-badge {
    position: absolute;
    top: -8px; right: 14px;
    background: var(--gold);
    color: #1a1a1a;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .winner-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }

  .winner-overlay.show { display: flex; }

  .winner-box {
    text-align: center;
    padding: 48px 56px;
    background: rgba(26,58,42,0.9);
    border: 2px solid var(--gold);
    border-radius: 24px;
    box-shadow: 0 0 80px rgba(201,168,76,0.25);
  }

  .winner-box h2 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 1rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .winner-name {
    font-family: 'Playfair Display', serif;
    color: var(--cream);
    font-size: 3rem;
    font-weight: 900;
    line-height: 1.1;
  }

  .winner-chips {
    font-family: 'DM Mono', monospace;
    color: var(--gold);
    font-size: 1.4rem;
    margin-top: 8px;
  }

  .new-game-btn {
    background: var(--gold);
    color: #1a1a1a;
    border: none;
    border-radius: 10px;
    padding: 14px 36px;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .new-game-btn:hover { background: var(--gold-light); transform: scale(1.03); }

  .pot-input {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 7px;
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 6px 10px;
    width: 80px;
    text-align: center;
    outline: none;
  }

  .pot-input:focus { border-color: var(--gold); }

  @media (max-width: 500px) {
    .players-grid { grid-template-columns: 1fr; }
    .pot-bar { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <h1>♠ POKER CHIPS ♠</h1>
  <p>Token Tracker</p>
</header>

<!-- SETUP -->
<div id="setup">
  <div class="setup-box">
    <h2>Number of Players</h2>
    <div class="player-count-btns">
      <button class="count-btn" onclick="selectCount(2)">2</button>
      <button class="count-btn" onclick="selectCount(3)">3</button>
      <button class="count-btn" onclick="selectCount(4)">4</button>
      <button class="count-btn" onclick="selectCount(5)">5</button>
      <button class="count-btn" onclick="selectCount(6)">6</button>
    </div>
    <div class="chips-setup">
      <label>Starting Chips per Player</label>
      <input type="number" id="startChips" value="1000" min="10" max="99999">
    </div>
    <button class="start-btn" onclick="startGame()">Deal In</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div class="pot-bar">
    <div>
      <div class="pot-label">Pot</div>
      <div class="pot-value"><span>◈</span><span id="potDisplay">0</span></div>
    </div>
    <div class="pot-actions">
      <input type="number" id="potAddInput" class="pot-input" placeholder="amt" min="1">
      <button class="pot-btn" onclick="addToPot()">+ Pot</button>
      <button class="pot-btn danger" onclick="distributePot()">Deal Out</button>
      <button class="pot-btn" onclick="newGame()" style="margin-left:6px;">↺ New</button>
    </div>
  </div>
  <div class="players-grid" id="playersGrid"></div>
</div>

<!-- WINNER -->
<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-box">
    <h2>🏆 Winner</h2>
    <div class="winner-name" id="winnerName">—</div>
    <div class="winner-chips" id="winnerChips"></div>
  </div>
  <button class="new-game-btn" onclick="newGame()">New Game</button>
</div>

<script>
const COLORS = ['#d63031','#2980b9','#27ae60','#8e44ad','#e67e22','#2d3436'];
const LABELS = ['P1','P2','P3','P4','P5','P6'];
const NAMES  = ['Player 1','Player 2','Player 3','Player 4','Player 5','Player 6'];
const PRESETS_ADD = [5,10,25,50];
const PRESETS_SUB = [5,10,25,50];

let playerCount = 2;
let players = [];
let pot = 0;
let currentTurn = 0;

function selectCount(n) {
  playerCount = n;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.count-btn')[n-2].classList.add('active');
}

selectCount(2);

function startGame() {
  const start = parseInt(document.getElementById('startChips').value) || 1000;
  players = Array.from({length: playerCount}, (_, i) => ({
    name: NAMES[i],
    chips: start,
    eliminated: false
  }));
  pot = 0;
  currentTurn = 0;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  renderPlayers();
  updatePot();
}

function renderPlayers() {
  const grid = document.getElementById('playersGrid');
  grid.innerHTML = '';
  players.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'player-card' + (i === currentTurn && !p.eliminated ? ' active-turn' : '') + (p.eliminated ? ' eliminated' : '');
    card.id = 'card-'+i;

    const isTurn = i === currentTurn && !p.eliminated;

    card.innerHTML = `
      ${isTurn ? '<div class="turn-badge">Your Turn</div>' : ''}
      <div class="card-header">
        <div class="chip-avatar" style="background:${COLORS[i]}">${LABELS[i]}</div>
        <input class="player-name-input" value="${p.name}" oninput="players[${i}].name=this.value" placeholder="Player name">
      </div>
      <div class="chip-count">${p.chips.toLocaleString()}<small>chips</small></div>
      <div class="quick-btns">
        ${PRESETS_ADD.map(v=>`<button class="qbtn add" onclick="addChips(${i},${v})">+${v}</button>`).join('')}
        ${PRESETS_SUB.map(v=>`<button class="qbtn sub" onclick="addChips(${i},-${v})">-${v}</button>`).join('')}
      </div>
      <div class="custom-row">
        <button class="cust-sub" onclick="customSub(${i})">−</button>
        <input type="number" class="custom-input" id="ci-${i}" placeholder="amount" min="1">
        <button class="cust-add" onclick="customAdd(${i})">+</button>
      </div>
      <div class="action-row">
        <button class="bet-btn" onclick="betToPot(${i})">Bet → Pot</button>
        <button class="bet-btn" onclick="winFromPot(${i})">Win Pot</button>
        ${!p.eliminated ? `<button class="elim-btn" onclick="eliminate(${i})">✕ Out</button>` : `<button class="elim-btn" onclick="revive(${i})">↺ In</button>`}
      </div>
    `;
    grid.appendChild(card);
  });
}

function addChips(i, amount) {
  players[i].chips = Math.max(0, players[i].chips + amount);
  refreshCard(i);
  checkWinner();
}

function customAdd(i) {
  const v = parseInt(document.getElementById('ci-'+i).value);
  if (v > 0) { addChips(i, v); document.getElementById('ci-'+i).value = ''; }
}

function customSub(i) {
  const v = parseInt(document.getElementById('ci-'+i).value);
  if (v > 0) { addChips(i, -v); document.getElementById('ci-'+i).value = ''; }
}

function betToPot(i) {
  const v = parseInt(document.getElementById('ci-'+i).value);
  if (!v || v <= 0) return;
  const actual = Math.min(v, players[i].chips);
  players[i].chips -= actual;
  pot += actual;
  document.getElementById('ci-'+i).value = '';
  updatePot();
  refreshCard(i);
  nextTurn();
}

function winFromPot(i) {
  if (pot <= 0) return;
  players[i].chips += pot;
  pot = 0;
  updatePot();
  refreshCard(i);
}

function addToPot() {
  const v = parseInt(document.getElementById('potAddInput').value);
  if (v > 0) { pot += v; document.getElementById('potAddInput').value = ''; updatePot(); }
}

function distributePot() {
  if (pot <= 0) return;
  const active = players.filter(p => !p.eliminated);
  if (!active.length) return;
  const share = Math.floor(pot / active.length);
  const rem = pot - share * active.length;
  players.forEach((p, i) => {
    if (!p.eliminated) { p.chips += share; }
  });
  players[currentTurn].chips += rem;
  pot = 0;
  updatePot();
  renderPlayers();
}

function eliminate(i) {
  players[i].eliminated = true;
  if (currentTurn === i) nextTurn();
  else renderPlayers();
  checkWinner();
}

function revive(i) {
  players[i].eliminated = false;
  renderPlayers();
}

function nextTurn() {
  let tries = 0;
  do {
    currentTurn = (currentTurn + 1) % players.length;
    tries++;
  } while (players[currentTurn].eliminated && tries < players.length);
  renderPlayers();
}

function updatePot() {
  document.getElementById('potDisplay').textContent = pot.toLocaleString();
}

function refreshCard(i) {
  renderPlayers();
}

function checkWinner() {
  const alive = players.filter(p => !p.eliminated);
  if (alive.length === 1) {
    document.getElementById('winnerName').textContent = alive[0].name;
    document.getElementById('winnerChips').textContent = alive[0].chips.toLocaleString() + ' chips';
    document.getElementById('winnerOverlay').classList.add('show');
  }
}

function newGame() {
  document.getElementById('winnerOverlay').classList.remove('show');
  document.getElementById('game').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
}
</script>
</body>
</html>
